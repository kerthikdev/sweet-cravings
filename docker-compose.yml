version: '3.9'

services:

  # ── User Service ─────────────────────────────────────────────────────────────
  user_service:
    build:
      context: ./backend/user_service
      dockerfile: Dockerfile
    container_name: bakery_user_service
    image: bakery-user-service:latest
    ports:
      - "${USER_SERVICE_PORT:-5001}:${USER_SERVICE_PORT:-5001}"
    env_file:
      - ./.env.docker
    environment:
      - MONGO_URI=${MONGO_URI}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-8}
      - USER_SERVICE_PORT=${USER_SERVICE_PORT:-5001}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',${USER_SERVICE_PORT:-5001})); s.close(); print('healthy')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Product Service ──────────────────────────────────────────────────────────
  product_service:
    build:
      context: ./backend/product_service
      dockerfile: Dockerfile
    container_name: bakery_product_service
    image: bakery-product-service:latest
    ports:
      - "${PRODUCT_SERVICE_PORT:-5002}:${PRODUCT_SERVICE_PORT:-5002}"
    env_file:
      - ./.env.docker
    environment:
      - MONGO_URI=${MONGO_URI}
      - PRODUCT_SERVICE_PORT=${PRODUCT_SERVICE_PORT:-5002}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',${PRODUCT_SERVICE_PORT:-5002})); s.close(); print('healthy')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Order Service ────────────────────────────────────────────────────────────
  order_service:
    build:
      context: ./backend/order_service
      dockerfile: Dockerfile
    container_name: bakery_order_service
    image: bakery-order-service:latest
    ports:
      - "${ORDER_SERVICE_PORT:-5003}:${ORDER_SERVICE_PORT:-5003}"
    env_file:
      - ./.env.docker
    environment:
      - MONGO_URI=${MONGO_URI}
      - ORDER_SERVICE_PORT=${ORDER_SERVICE_PORT:-5003}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',${ORDER_SERVICE_PORT:-5003})); s.close(); print('healthy')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Payment Service ──────────────────────────────────────────────────────────
  payment_service:
    build:
      context: ./backend/payment_service
      dockerfile: Dockerfile
    container_name: bakery_payment_service
    image: bakery-payment-service:latest
    ports:
      - "${PAYMENT_SERVICE_PORT:-5004}:${PAYMENT_SERVICE_PORT:-5004}"
    env_file:
      - ./.env.docker
    environment:
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL:-http://order_service:5003}
      - PAYMENT_SERVICE_PORT=${PAYMENT_SERVICE_PORT:-5004}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    depends_on:
      order_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',${PAYMENT_SERVICE_PORT:-5004})); s.close(); print('healthy')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - bakery_net
    restart: unless-stopped

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api_gateway:
    build:
      context: ./backend/api_gateway
      dockerfile: Dockerfile
    container_name: bakery_api_gateway
    image: bakery-api-gateway:latest
    ports:
      - "${API_GATEWAY_PORT:-5050}:${API_GATEWAY_PORT:-5050}"
    env_file:
      - ./.env.docker
    environment:
      - USER_SERVICE_HOST=user_service
      - PRODUCT_SERVICE_HOST=product_service
      - ORDER_SERVICE_HOST=order_service
      - PAYMENT_SERVICE_HOST=payment_service
      - USER_SERVICE_PORT=${USER_SERVICE_PORT:-5001}
      - PRODUCT_SERVICE_PORT=${PRODUCT_SERVICE_PORT:-5002}
      - ORDER_SERVICE_PORT=${ORDER_SERVICE_PORT:-5003}
      - PAYMENT_SERVICE_PORT=${PAYMENT_SERVICE_PORT:-5004}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-5050}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
    depends_on:
      user_service:
        condition: service_healthy
      product_service:
        condition: service_healthy
      order_service:
        condition: service_healthy
      payment_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',${API_GATEWAY_PORT:-5050})); s.close(); print('healthy')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Frontend — React SPA via Nginx ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        - VITE_API_GATEWAY_URL=${VITE_API_GATEWAY_URL:-http://localhost:5050}
    container_name: bakery_frontend
    image: bakery-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    env_file:
      - ./frontend-react/.env.docker
    environment:
      - API_GATEWAY_URL=http://api_gateway:5050
    depends_on:
      api_gateway:
        condition: service_healthy
    networks:
      - bakery_net
    restart: unless-stopped

networks:
  bakery_net:
    driver: bridge