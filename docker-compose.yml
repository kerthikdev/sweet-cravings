version: '3.9'

services:

  # ── User Service ─────────────────────────────────────────────────────────────
  user_service:
    platform: linux/amd64
    build:
      context: ./backend/user_service
      dockerfile: Dockerfile
    container_name: bakery_user_service
    hostname: user-service          # RFC-valid hostname (hyphens, no underscores)
    image: bakery-user-service:latest
    ports:
      - "${USER_SERVICE_PORT:-5001}:${USER_SERVICE_PORT:-5001}"
    env_file:
      - ./.env.docker
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Product Service ──────────────────────────────────────────────────────────
  product_service:
    platform: linux/amd64
    build:
      context: ./backend/product_service
      dockerfile: Dockerfile
    container_name: bakery_product_service
    hostname: product-service
    image: bakery-product-service:latest
    ports:
      - "${PRODUCT_SERVICE_PORT:-5002}:${PRODUCT_SERVICE_PORT:-5002}"
    env_file:
      - ./.env.docker
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Order Service ────────────────────────────────────────────────────────────
  order_service:
    platform: linux/amd64
    build:
      context: ./backend/order_service
      dockerfile: Dockerfile
    container_name: bakery_order_service
    hostname: order-service
    image: bakery-order-service:latest
    ports:
      - "${ORDER_SERVICE_PORT:-5003}:${ORDER_SERVICE_PORT:-5003}"
    env_file:
      - ./.env.docker
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Payment Service ──────────────────────────────────────────────────────────
  payment_service:
    platform: linux/amd64
    build:
      context: ./backend/payment_service
      dockerfile: Dockerfile
    container_name: bakery_payment_service
    hostname: payment-service
    image: bakery-payment-service:latest
    ports:
      - "${PAYMENT_SERVICE_PORT:-5004}:${PAYMENT_SERVICE_PORT:-5004}"
    env_file:
      - ./.env.docker
    environment:
      # Service discovery — use hyphenated hostnames (Werkzeug rejects underscores)
      - ORDER_SERVICE_HOST=order-service
      - ORDER_SERVICE_PORT=${ORDER_SERVICE_PORT:-5003}
    depends_on:
      order_service:
        condition: service_started
    networks:
      - bakery_net
    restart: unless-stopped

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api_gateway:
    platform: linux/amd64
    build:
      context: ./backend/api_gateway
      dockerfile: Dockerfile
    container_name: bakery_api_gateway
    hostname: api-gateway
    image: bakery-api-gateway:latest
    ports:
      - "${API_GATEWAY_PORT:-5050}:${API_GATEWAY_PORT:-5050}"
    env_file:
      - ./.env.docker
    environment:
      # Service discovery — hyphenated hostnames required by Werkzeug host validation
      - USER_SERVICE_HOST=user-service
      - PRODUCT_SERVICE_HOST=product-service
      - ORDER_SERVICE_HOST=order-service
      - PAYMENT_SERVICE_HOST=payment-service
    depends_on:
      - user_service
      - product_service
      - order_service
      - payment_service
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Frontend — React SPA via Nginx ──────────────────────────────────────────
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        # Empty = relative URLs; Nginx inside the container proxies /api → api-gateway:5050
        # For ECS/cloud deployments, set this to your ALB DNS e.g. https://your-alb.amazonaws.com
        - VITE_API_GATEWAY_URL=
    container_name: bakery_frontend
    image: bakery-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      # Nginx template vars — hyphenated hostname so DNS resolves correctly
      - API_GATEWAY_HOST=${API_GATEWAY_HOST:-api-gateway}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-5050}
    depends_on:
      - api_gateway
    networks:
      - bakery_net
    restart: unless-stopped

networks:
  bakery_net:
    driver: bridge
