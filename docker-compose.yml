version: '3.9'

services:

  # ── User Service ─────────────────────────────────────────────────────────────
  user_service:
    platform: linux/amd64
    build:
      context: ./backend/user_service
      dockerfile: Dockerfile
    container_name: bakery_user_service
    hostname: user-service          # RFC-valid hostname (hyphens, no underscores)
    image: bakery-user-service:latest
    ports:
      - "${USER_SERVICE_PORT:-5001}:${USER_SERVICE_PORT:-5001}"
    env_file:
      - ./.env.docker
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Product Service ──────────────────────────────────────────────────────────
  product_service:
    platform: linux/amd64
    build:
      context: ./backend/product_service
      dockerfile: Dockerfile
    container_name: bakery_product_service
    hostname: product-service
    image: bakery-product-service:latest
    ports:
      - "${PRODUCT_SERVICE_PORT:-5002}:${PRODUCT_SERVICE_PORT:-5002}"
    env_file:
      - ./.env.docker
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Order Service ────────────────────────────────────────────────────────────
  order_service:
    platform: linux/amd64
    build:
      context: ./backend/order_service
      dockerfile: Dockerfile
    container_name: bakery_order_service
    hostname: order-service
    image: bakery-order-service:latest
    ports:
      - "${ORDER_SERVICE_PORT:-5003}:${ORDER_SERVICE_PORT:-5003}"
    env_file:
      - ./.env.docker
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Payment Service ──────────────────────────────────────────────────────────
  payment_service:
    platform: linux/amd64
    build:
      context: ./backend/payment_service
      dockerfile: Dockerfile
    container_name: bakery_payment_service
    hostname: payment-service
    image: bakery-payment-service:latest
    ports:
      - "${PAYMENT_SERVICE_PORT:-5004}:${PAYMENT_SERVICE_PORT:-5004}"
    env_file:
      - ./.env.docker
    environment:
      # Service discovery — use hyphenated hostnames (Werkzeug rejects underscores)
      - ORDER_SERVICE_HOST=order-service
      - ORDER_SERVICE_PORT=${ORDER_SERVICE_PORT:-5003}
    depends_on:
      order_service:
        condition: service_started
    networks:
      - bakery_net
    restart: unless-stopped

  # ── API Gateway ──────────────────────────────────────────────────────────────
  api_gateway:
    platform: linux/amd64
    build:
      context: ./backend/api_gateway
      dockerfile: Dockerfile
    container_name: bakery_api_gateway
    hostname: api-gateway
    image: bakery-api-gateway:latest
    ports:
      - "${API_GATEWAY_PORT:-5050}:${API_GATEWAY_PORT:-5050}"
    env_file:
      - ./.env.docker
    environment:
      # Service discovery — hyphenated hostnames required by Werkzeug host validation
      - USER_SERVICE_HOST=user-service
      - PRODUCT_SERVICE_HOST=product-service
      - ORDER_SERVICE_HOST=order-service
      - PAYMENT_SERVICE_HOST=payment-service
    depends_on:
      - user_service
      - product_service
      - order_service
      - payment_service
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Frontend — React SPA via Nginx ──────────────────────────────────────────
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        # Empty = relative URLs; Nginx inside the container proxies /api → api-gateway:5050
        # For ECS/cloud deployments, set this to your ALB DNS e.g. https://your-alb.amazonaws.com
        - VITE_API_GATEWAY_URL=
    container_name: bakery_frontend
    image: bakery-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      # Nginx template vars — hyphenated hostname so DNS resolves correctly
      - API_GATEWAY_HOST=${API_GATEWAY_HOST:-api-gateway}
      - API_GATEWAY_PORT=${API_GATEWAY_PORT:-5050}
    depends_on:
      - api_gateway
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: bakery_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    depends_on:
      - api_gateway
      - user_service
      - product_service
      - order_service
      - payment_service
    networks:
      - bakery_net
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: bakery_grafana
    ports:
      - "${GRAFANA_PORT:-4000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # Dark theme by default
      - GF_USERS_DEFAULT_THEME=dark
      # Nice title in browser tab
      - GF_SERVER_ROOT_URL=http://localhost:${GRAFANA_PORT:-4000}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/sweet-cravings.json
      # Disable telemetry for cleaner logs
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - bakery_net
    restart: unless-stopped

networks:
  bakery_net:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
