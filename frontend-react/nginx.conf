server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve React SPA — all client-side routes handled by index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the api_gateway container
    # MUST use container service name "api_gateway", NOT "localhost"
    location /api/ {
        proxy_pass http://api_gateway:5050;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
