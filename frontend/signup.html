<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet Cravings | Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="logo">🍰</div>
    <h2>Create Account</h2>
    <img src="images/signup.jpg" alt="Signup">
    <p id="error-msg" class="error-msg" style="display:none;"></p>
    <div class="form-group">
      <label>Username</label>
      <input id="username" type="text" placeholder="Choose a username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Choose a password" autocomplete="new-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doSignup()">Create Account</button>
    <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function doSignup() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!username || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }

      try {
        const res  = await fetch(`${API_BASE}/api/auth/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = 'login.html';
        } else {
          errEl.textContent = data.error || 'Signup failed.';
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Cannot reach server. Is the backend running?';
        errEl.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
  </script>
</body>
</html>
