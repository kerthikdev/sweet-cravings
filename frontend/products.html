<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet Cravings | Products</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="navbar-brand" href="products.html">🍰 Sweet Cravings</a>
    <form class="search-bar" onsubmit="return doSearch(event)">
      <input id="search-input" type="search" placeholder="Search treats…">
      <button type="submit">Search</button>
    </form>
    <div class="nav-links">
      <a href="cart.html">🛒 Cart <span class="cart-badge cart-count">0</span></a>
      <a href="orders.html">📦 Orders</a>
      <a href="admin.html">⚙ Admin</a>
      <a href="#" class="btn-logout" onclick="logout()">Logout</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Freshly Baked Happiness 🍰</h1>
      <p>Delicious treats delivered to your doorstep</p>
      <a href="#products" class="btn btn-warning btn-lg">Shop Now</a>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="container section" id="products">
    <div class="category-bar">
      <a href="products.html" id="cat-all" class="active">All</a>
      <a href="#" onclick="loadCategory('Bread')">🥖 Bread</a>
      <a href="#" onclick="loadCategory('Cakes')">🧁 Cakes</a>
      <a href="#" onclick="loadCategory('Pastries')">🥐 Pastries</a>
    </div>

    <h2 style="text-align:center;margin-bottom:2rem;color:var(--brown);">Our Products</h2>
    <div id="product-grid" class="product-grid">
      <div class="spinner"></div>
    </div>
  </div>

  <footer>© 2026 Sweet Cravings Bakery | Freshness Delivered Daily 🍰</footer>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
