<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet Cravings | Order Success</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="products.html">🍰 Sweet Cravings</a>
    <div class="nav-links">
      <a href="orders.html">📦 My Orders</a>
      <a href="#" class="btn-logout" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container success-page">
    <div class="success-card">
      <div class="success-icon">✅</div>
      <h2>Payment Successful!</h2>
      <p style="color:var(--muted);margin:0.5rem 0 1.5rem;">Thank you for your order 🎉</p>
      <table style="width:100%;text-align:left;margin-bottom:1.5rem;">
        <tr><td style="color:var(--muted);padding:0.4rem 0;">Order ID</td><td><strong id="order-id">—</strong></td></tr>
        <tr><td style="color:var(--muted);padding:0.4rem 0;">Total</td><td><strong id="order-total" style="color:var(--success)">—</strong></td></tr>
        <tr><td style="color:var(--muted);padding:0.4rem 0;">Date</td><td id="order-date">—</td></tr>
      </table>
      <a href="orders.html" class="btn btn-primary btn-full">View My Orders</a>
      <a href="products.html" class="btn btn-outline btn-full" style="margin-top:0.6rem;">Continue Shopping</a>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (!requireAuth()) {} else {
      const params = new URLSearchParams(window.location.search);
      document.getElementById('order-id').textContent    = params.get('order_id') || '—';
      document.getElementById('order-total').textContent = `₹${params.get('total') || '0'}`;
      document.getElementById('order-date').textContent  = params.get('timestamp') || '—';
      updateCartBadge();
    }
  </script>
</body>
</html>
