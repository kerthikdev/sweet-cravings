<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweet Cravings | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="logo">🍰</div>
    <h2>Sweet Cravings</h2>
    <img src="images/login.jpg" alt="Login">
    <p id="error-msg" class="error-msg" style="display:none;"></p>
    <div class="form-group">
      <label>Username</label>
      <input id="username" type="text" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Login</button>
    <p class="auth-link">No account? <a href="signup.html">Sign Up</a></p>
  </div>

  <script src="js/config.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = 'products.html';

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!username || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }

      try {
        const res  = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('username', data.username);
          window.location.href = 'products.html';
        } else {
          errEl.textContent = data.error || 'Login failed.';
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Cannot reach server. Is the backend running?';
        errEl.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
