version: '3.8'

services:

  # ─── User Service ────────────────────────────────────────────────────
  user_service:
    build: ./user_service
    container_name: bakery_user_service
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - MONGO_URI=${MONGO_URI}
    networks:
      - bakery_net

  # ─── Product Service ─────────────────────────────────────────────────
  product_service:
    build: ./product_service
    container_name: bakery_product_service
    ports:
      - "5002:5002"
    env_file: .env
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - bakery_net

  # ─── Order Service ───────────────────────────────────────────────────
  order_service:
    build: ./order_service
    container_name: bakery_order_service
    ports:
      - "5003:5003"
    env_file: .env
    environment:
      - MONGO_URI=${MONGO_URI}
    networks:
      - bakery_net

  # ─── Payment Service ─────────────────────────────────────────────────
  payment_service:
    build: ./payment_service
    container_name: bakery_payment_service
    ports:
      - "5004:5004"
    environment:
      - ORDER_SERVICE_URL=http://order_service:5003
    networks:
      - bakery_net

  # ─── API Gateway ─────────────────────────────────────────────────────
  api_gateway:
    build: ./api_gateway
    container_name: bakery_api_gateway
    ports:
      - "5050:5050"
    depends_on:
      - user_service
      - product_service
      - order_service
      - payment_service
    env_file: .env
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - USER_SERVICE_URL=http://user_service:5001
      - PRODUCT_SERVICE_URL=http://product_service:5002
      - ORDER_SERVICE_URL=http://order_service:5003
      - PAYMENT_SERVICE_URL=http://payment_service:5004
    networks:
      - bakery_net

networks:
  bakery_net:
    driver: bridge
